<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanzz AI | Secure Admin Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0f0f0f;
            --card: #141414;
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4d4d;
            --border: #222222;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Login Screen --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--border);
            width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box h2 { margin-bottom: 25px; letter-spacing: 1px; font-weight: 300; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; display: block; }
        
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); 
            color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-login { 
            width: 100%; padding: 14px; background: var(--accent); color: black; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            margin-top: 10px; font-size: 1rem; transition: 0.3s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:disabled { background: #333; color: #666; cursor: not-allowed; }

        #lockMessage { 
            color: var(--error); display: none; margin-top: 20px; 
            font-size: 0.85rem; padding: 10px; border: 1px solid var(--error); border-radius: 5px;
        }

        /* --- Dashboard UI --- */
        .sidebar { width: 260px; background: var(--sidebar); padding: 30px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar h2 { font-weight: 800; font-size: 1.5rem; margin-bottom: 40px; }
        .nav-item { color: var(--text-dim); padding: 12px 0; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        .nav-item:hover { color: var(--accent); }
        .nav-item i { margin-right: 10px; width: 20px; }

        .main-content { flex: 1; padding: 50px; overflow-y: auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 30px; border: 1px solid var(--border); border-radius: 12px; }
        .stat-card p { color: var(--text-dim); margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        .stat-card h2 { font-size: 2.8rem; margin: 10px 0 0 0; font-weight: 700; }

        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1a1a1a; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <div style="background: white; width: 50px; height: 50px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <i class="fas fa-shield-alt" style="color: black; font-size: 1.5rem;"></i>
        </div>
        <h2>Sanzz Admin</h2>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="adminUser" placeholder="Enter username...">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPass" placeholder="••••••••••••">
        </div>

        <button class="btn-login" id="loginBtn" onclick="attemptLogin()">Access Dashboard</button>
        <p id="lockMessage"><i class="fas fa-clock"></i> Security Lock: Too many attempts. Locked for 4 hours.</p>
    </div>
</div>

<div class="sidebar">
    <h2>SANZZ <span style="font-weight: 200;">AI</span></h2>
    <div class="nav-item"><i class="fas fa-chart-pie"></i> Overview</div>
    <div class="nav-item"><i class="fas fa-users"></i> Student Traffic</div>
    <div class="nav-item"><i class="fas fa-database"></i> Knowledge Base</div>
    <div class="nav-item"><i class="fas fa-user-slash"></i> Blacklist</div>
    
    <div style="margin-top: auto;">
        <div class="nav-item" onclick="location.reload()" style="color: var(--error);"><i class="fas fa-power-off"></i> Logout</div>
    </div>
</div>

<div class="main-content">
    <div class="header-row">
        <h1>System Analytics</h1>
        <div style="font-size: 0.9rem; color: var(--text-dim);" id="currentTime"></div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <p>Total API Calls</p>
            <h2 id="totalQ">0</h2>
        </div>
        <div class="stat-card">
            <p>Flagged Content</p>
            <h2 id="bannedUsers" style="color: var(--error);">0</h2>
        </div>
        <div class="stat-card">
            <p>Server Status</p>
            <h2 style="color: #22c55e;">ONLINE</h2>
        </div>
    </div>

    <h3>Recent Transactions</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Grade</th>
                    <th>Question Excerpt</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Configuration
    const BACKEND_URL = "https://math-ai-sanzz.onrender.com"; 
    const TARGET_USER = "sanduni";
    const TARGET_PASS = "momsanzdad2001#";
    
    // Auth Logic
    let attempts = parseInt(localStorage.getItem('admin_attempts')) || 0;
    let lockUntil = localStorage.getItem('admin_lock_time') || 0;

    function checkSecurity() {
        const now = new Date().getTime();
        if (now < lockUntil) {
            document.getElementById('lockMessage').style.display = 'block';
            document.getElementById('loginBtn').disabled = true;
            return false;
        }
        return true;
    }

    async function attemptLogin() {
        if (!checkSecurity()) return;

        const userField = document.getElementById('adminUser').value;
        const passField = document.getElementById('adminPass').value;

        if (userField === TARGET_USER && passField === TARGET_PASS) {
            // Success
            document.getElementById('loginOverlay').style.display = 'none';
            localStorage.setItem('admin_attempts', 0);
            startDashboard(passField);
        } else {
            // Fail
            attempts++;
            localStorage.setItem('admin_attempts', attempts);
            
            if (attempts >= 4) {
                const lockDuration = new Date().getTime() + (4 * 60 * 60 * 1000);
                localStorage.setItem('admin_lock_time', lockDuration);
                checkSecurity();
            } else {
                alert(`ප්‍රවේශය ප්‍රතික්ෂේප විය! ඉතිරි වාර ගණන: ${4 - attempts}`);
            }
        }
    }

    async function startDashboard(pw) {
        // Current Time
        document.getElementById('currentTime').innerText = "Last Updated: " + new Date().toLocaleString();
        
        try {
            // Fetch Stats
            const statsRes = await fetch(`${BACKEND_URL}/admin/stats`, {
                headers: { 'X-Admin-Password': pw }
            });
            const stats = await statsRes.json();
            
            document.getElementById('totalQ').innerText = stats.total_questions || 0;
            document.getElementById('bannedUsers').innerText = stats.blacklisted_users?.length || 0;

            // Fetch History
            const histRes = await fetch(`${BACKEND_URL}/admin/history`, {
                headers: { 'X-Admin-Password': pw }
            });
            const histData = await histRes.json();
            const body = document.getElementById('historyBody');
            
            body.innerHTML = histData.history.reverse().slice(0, 10).map(item => `
                <tr>
                    <td><b>${item.user}</b></td>
                    <td>${item.grade}</td>
                    <td style="color: var(--text-dim)">${item.question.substring(0, 50)}...</td>
                    <td>${new Date(item.time).toLocaleTimeString()}</td>
                </tr>
            `).join('');

        } catch (err) {
            console.error("Data fetch error:", err);
        }
    }

    // Initialize
    checkSecurity();
</script>

</body>
</html>
