<style>
  /* Browser indicator එකේ UI එක සැඟවීමට සහ recording වෙලාවට අනවශ්‍ය දේ පෙන්වීම වැළැක්වීමට */
  .voice-visualizer, .recording-dot { display: none !important; }
  
  /* Voice Summary Button එකට අදාළ style */
  .voice-output-btn {
    background: rgba(124, 106, 247, 0.1);
    border: 1px solid var(--accent);
    color: var(--accent2);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    transition: all 0.2s;
  }
  .voice-output-btn:hover { background: var(--accent); color: white; }
</style>

<script>
  // ... (කලින් තිබූ Config සහ State කොටස් එලෙසම තබා ගන්න) ...

  let isUserStopped = false; // User manually stop කළාදැයි බලන්න

  // ══ Voice Logic (Manual Stop & Continuous) ══
  function toggleVoice() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      showToast('⚠️ Voice not supported!'); return;
    }

    if (isRecording) {
      isUserStopped = true;
      recognition.stop();
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = LANG[selectedLang].voiceLang;
    recognition.continuous = true; // මේක නිසා ඉබේ නතර වෙන්නේ නැහැ
    recognition.interimResults = false;

    recognition.onstart = () => {
      isRecording = true;
      isUserStopped = false;
      document.getElementById('voiceBtn').classList.add('recording');
      document.getElementById('voiceBtn').textContent = '⏹️';
    };

    recognition.onresult = e => {
      let finalTranscript = '';
      for (let i = e.resultIndex; i < e.results.length; ++i) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      }
      if(finalTranscript) {
        document.getElementById('questionInput').value += finalTranscript;
        autoResize(document.getElementById('questionInput'));
      }
    };

    recognition.onend = () => {
      // User stop කරේ නැත්නම්, network error එකකදී වුණත් ආයේ start කරනවා
      if (!isUserStopped) {
        recognition.start();
      } else {
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('recording');
        document.getElementById('voiceBtn').textContent = '🎤';
      }
    };

    recognition.onerror = (event) => {
      console.error("Speech Error: ", event.error);
      if(event.error !== 'no-speech') {
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('recording');
        document.getElementById('voiceBtn').textContent = '🎤';
      }
    };
    
    recognition.start();
  }

  // ══ Smart Voice Summary Output ══
  async function speakSummary(text, msgBubbleElement) {
    try {
      // Button එක "Loading" තත්වයට පත් කිරීම
      const btn = msgBubbleElement.querySelector('.voice-output-btn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '⌛ Summarizing...';

      // Backend එකට යවනවා සාරාංශයක් ඉල්ලලා
      const res = await fetch(`${BACKEND}/solve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: `පහත උත්තරයේ කෙටි සාරාංශයක් හඬ පාලන පද්ධතියකට ගැලපෙන ලෙස වාක්‍ය දෙකකින් ලබා දෙන්න: ${text}`,
          name: userName,
          grade: userGrade,
          subject: 'General',
          language: selectedLang,
          is_summary_request: true // backend එකේ logic එකට flag එකක්
        })
      });

      const data = await res.json();
      btn.innerHTML = originalHTML;

      // Browser TTS පාවිච්චි කරලා සාරාංශය කියවීම
      const utterance = new SpeechSynthesisUtterance(data.answer);
      utterance.lang = LANG[selectedLang].voiceLang;
      utterance.rate = 0.9; // ටිකක් හෙමින් කියවන්න
      window.speechSynthesis.speak(utterance);

    } catch (e) {
      showToast('⚠️ Voice output failed!');
      console.error(e);
    }
  }

  // ══ Message එකක් එකතු කරන විට Voice Button එක එකතු කිරීම ══
  function addMessage(type, text, graphUrl) {
    const area = document.getElementById('chatArea');
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    
    let html = `
      <div class="msg-avatar ${type}-avatar">${type==='ai'?'🧠':'👤'}</div>
      <div class="msg-bubble">
        <div class="msg-text">${text}</div>
    `;

    // AI message එකක් නම් Voice Summary Button එක එකතු කරනවා
    if (type === 'ai') {
      html += `<button class="voice-output-btn" onclick="speakSummary(\`${text.replace(/`/g, "'")}\`, this.parentElement)">🔊 Listen Summary</button>`;
    }

    if (graphUrl) html += `<img src="${graphUrl}" class="graph-img">`;
    html += `</div>`;
    
    msg.innerHTML = html;
    area.appendChild(msg);
    area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
  }

  // ... (ඉතිරි මුල් කේතය එලෙසම තබා ගන්න) ...
</script>
