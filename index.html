<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanz AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --accent3: #38bdf8;
    --text: #e8e8f0;
    --text2: #8888a8;
    --success: #34d399;
    --danger: #f87171;
    --warning: #fbbf24;
    --glow: rgba(124, 106, 247, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--glow);
  }

  .logo-text { font-size: 18px; font-weight: 700; }
  .logo-text span { color: var(--accent2); }

  .new-chat-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    padding: 12px 16px;
    color: white; font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s; margin-bottom: 8px;
    box-shadow: 0 4px 20px var(--glow);
  }
  .new-chat-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,247,0.3); }

  .sidebar-label {
    font-size: 11px; font-weight: 600;
    color: var(--text2); text-transform: uppercase;
    letter-spacing: 1px; padding: 8px 12px 4px;
  }

  .subject-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 10px; padding: 10px 14px;
    color: var(--text2); font-family: 'Sora', sans-serif;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.2s; text-align: left;
  }
  .subject-btn:hover, .subject-btn.active {
    background: var(--surface2); border-color: var(--border);
    color: var(--text);
  }
  .subject-btn.active { border-color: var(--accent); color: var(--accent2); }

  .sidebar-footer {
    margin-top: auto;
    padding: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text2);
    text-align: center; line-height: 1.6;
  }
  .sidebar-footer strong { color: var(--accent2); }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .grade-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 13px;
    cursor: pointer; outline: none;
  }

  .status-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px; font-size: 12px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat Area */
  .chat-area {
    flex: 1; overflow-y: auto;
    padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome */
  .welcome {
    text-align: center; padding: 60px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; box-shadow: 0 0 40px var(--glow);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .welcome h2 { font-size: 28px; font-weight: 700; }
  .welcome h2 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .welcome p { color: var(--text2); font-size: 15px; max-width: 400px; line-height: 1.6; }

  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .quick-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 16px;
    color: var(--text2); font-family: 'Sora', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--glow); }

  /* Messages */
  .message { display: flex; gap: 12px; max-width: 800px; animation: msgIn 0.3s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }

  .msg-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .ai-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .user-avatar { background: linear-gradient(135deg, var(--accent3), #0ea5e9); }

  .msg-bubble {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 18px;
    font-size: 14px; line-height: 1.7; max-width: 600px;
  }
  .message.user .msg-bubble {
    background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(192,132,252,0.1));
    border-color: rgba(124,106,247,0.3);
  }

  .msg-meta { font-size: 11px; color: var(--text2); margin-top: 6px; display: flex; gap: 8px; align-items: center; }
  .verified-badge { background: rgba(52,211,153,0.15); color: var(--success); padding: 2px 8px; border-radius: 20px; font-size: 10px; }
